<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 80" width="340" height="80">
  <defs>
    <linearGradient id="cubeGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B1A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E64A00;stop-opacity:1" />
    </linearGradient>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@700&amp;family=DM+Sans:wght@400&amp;display=swap');
    </style>
  </defs>

  <!-- Cube icon -->
  <!-- Top face -->
  <polygon points="40,8 68,24 40,40 12,24" fill="url(#cubeGrad2)" />
  <!-- Left face -->
  <polygon points="12,24 40,40 40,64 12,48" fill="#1A1A1A" />
  <!-- Right face -->
  <polygon points="68,24 40,40 40,64 68,48" fill="#333333" />
  <!-- Subtle grid lines -->
  <line x1="40" y1="8" x2="40" y2="40" stroke="rgba(255,255,255,0.2)" stroke-width="0.8"/>
  <line x1="26" y1="16" x2="54" y2="32" stroke="rgba(255,255,255,0.2)" stroke-width="0.8"/>
  <line x1="54" y1="16" x2="26" y2="32" stroke="rgba(255,255,255,0.2)" stroke-width="0.8"/>

  <!-- IDR acronym bold -->
  <text x="84" y="34" font-family="'DM Sans', 'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="28" fill="#0D0D0D" letter-spacing="2">IDR</text>

  <!-- Thin orange divider line -->
  <rect x="84" y="40" width="88" height="2" fill="#FF6B1A" rx="1"/>

  <!-- Full name below -->
  <text x="84" y="58" font-family="'DM Sans', 'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="10.5" fill="#444444" letter-spacing="1.5">INSTITUTE OF DIGITAL RISK</text>
</svg>
