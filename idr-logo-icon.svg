<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <defs>
    <linearGradient id="cubeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B1A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E64A00;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sideFaceGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#CC3D00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6B1A;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Isometric cube top face -->
  <polygon points="40,8 68,24 40,40 12,24" fill="url(#cubeGrad)" />

  <!-- Left face -->
  <polygon points="12,24 40,40 40,64 12,48" fill="#1A1A1A" />

  <!-- Right face -->
  <polygon points="68,24 40,40 40,64 68,48" fill="#333333" />

  <!-- Alert/risk accent: small orange triangle on top-left edge -->
  <polygon points="12,24 22,19 17,30" fill="#FF8C42" opacity="0.6" />

  <!-- Grid lines on top face suggesting structure -->
  <line x1="40" y1="8" x2="40" y2="40" stroke="rgba(255,255,255,0.2)" stroke-width="0.8"/>
  <line x1="26" y1="16" x2="54" y2="32" stroke="rgba(255,255,255,0.2)" stroke-width="0.8"/>
  <line x1="54" y1="16" x2="26" y2="32" stroke="rgba(255,255,255,0.2)" stroke-width="0.8"/>

  <!-- Vertical edge lines -->
  <line x1="12" y1="24" x2="12" y2="48" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
  <line x1="68" y1="24" x2="68" y2="48" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
</svg>
